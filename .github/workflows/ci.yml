name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: rustup toolchain install 1.96.0 --profile minimal --component clippy --component rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --all-features
      - run: cargo test --release --workspace
      - run: cargo run --release -p retro-cli

  fuzz-smoke:
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: rustup toolchain install nightly-2026-07-12 --profile minimal
      - run: cargo install cargo-fuzz --version 0.13.2 --locked
      - shell: pwsh
        run: ./tools/run-fuzz.ps1 -Runs 10000 -Toolchain nightly-2026-07-12
